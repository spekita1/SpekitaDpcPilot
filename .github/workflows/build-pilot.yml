# Publication retry: official TestDPC v9.0.12 verbatim
# Publication retry: official TestDPC v9.0.12 APK verbatim
name: Publish official TestDPC QR pilot

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/build-pilot.yml"
      - "scripts/generate-provisioning-assets.sh"
  workflow_dispatch:

permissions:
  contents: write

env:
  UPSTREAM_REPOSITORY: googlesamples/android-testdpc
  UPSTREAM_TAG: v9.0.12
  RELEASE_TAG: pilot-v0.1.1
  OFFICIAL_SIGNATURE_CHECKSUM: gJD2YwtOiWJHkSMkkIfLRlj-quNqG1fb6v100QmzM9w=

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out pilot files
        uses: actions/checkout@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install verification and QR tooling
        run: |
          sdkmanager "build-tools;35.0.0"
          sudo apt-get update
          sudo apt-get install -y jq qrencode

      - name: Download the official release APK verbatim
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist
          api="https://api.github.com/repos/${UPSTREAM_REPOSITORY}/releases/tags/${UPSTREAM_TAG}"
          mapfile -t apk_urls < <(curl --fail --silent --show-error \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "$api" | jq -r '.assets[] | select(.name | ascii_downcase | endswith(".apk")) | .browser_download_url')
          if [[ "${#apk_urls[@]}" -ne 1 ]]; then
            echo "Expected exactly one official APK asset; found ${#apk_urls[@]}" >&2
            exit 1
          fi
          curl --fail --location --show-error \
            -H "Accept: application/octet-stream" \
            -o dist/SpekitaDpcPilot.apk "${apk_urls[0]}"
          test -s dist/SpekitaDpcPilot.apk
          printf '%s\n' "${apk_urls[0]}" > dist/OFFICIAL_SOURCE_URL.txt

      - name: Verify the official Google signing certificate
        run: |
          set -euo pipefail
          apksigner="${ANDROID_HOME}/build-tools/35.0.0/apksigner"
          "$apksigner" verify --verbose --print-certs dist/SpekitaDpcPilot.apk \
            | tee dist/APKSIGNER.txt
          cert_hex="$(sed -n 's/^Signer #1 certificate SHA-256 digest: //p' dist/APKSIGNER.txt | head -n 1 | tr -d ':[:space:]')"
          test -n "$cert_hex"
          actual="$(printf '%s' "$cert_hex" | xxd -r -p | openssl base64 -A | tr '+/' '-_')"
          if [[ "$actual" != "$OFFICIAL_SIGNATURE_CHECKSUM" ]]; then
            echo "Official signer mismatch: $actual" >&2
            exit 1
          fi
          printf '%s\n' "$actual" > dist/OFFICIAL_SIGNATURE_CHECKSUM.txt

      - name: Generate Device Owner QR from the same APK
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          download_url="https://github.com/${REPOSITORY}/releases/download/${RELEASE_TAG}/SpekitaDpcPilot.apk"
          bash scripts/generate-provisioning-assets.sh \
            dist/SpekitaDpcPilot.apk \
            "$download_url" \
            dist \
            "$OFFICIAL_SIGNATURE_CHECKSUM"
          sha256sum dist/SpekitaDpcPilot.apk > dist/SHA256SUMS.txt

      - name: Upload verification artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpekitaDpcPilot-${{ github.sha }}
          path: dist/
          if-no-files-found: error

      - name: Publish pilot-v0.1.1 once
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "$RELEASE_TAG already exists; leaving it unchanged."
            exit 0
          fi
          gh release create "$RELEASE_TAG" dist/* \
            --title "Spekita DPC Pilot $RELEASE_TAG" \
            --notes "Byte-for-byte official Google TestDPC $UPSTREAM_TAG release APK. Signing certificate verified before publication. Control pilot only; not for production."
